<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>GameUp — Villaggio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
canvas{display:block;image-rendering:pixelated}

#nameScreen{
  position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a3a0a 0%,#0a1a05 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:99;
}
#nameScreen h1{
  font-family:'Press Start 2P',monospace;font-size:2rem;color:#7bc74d;
  text-shadow:0 0 20px #7bc74d,3px 3px 0 #2a5c10;letter-spacing:4px;animation:glow 2s ease-in-out infinite alternate;
}
@keyframes glow{from{text-shadow:0 0 10px #7bc74d,3px 3px 0 #2a5c10}to{text-shadow:0 0 30px #7bc74d,0 0 60px #5a9730,3px 3px 0 #2a5c10}}
#nameScreen p{font-family:'Press Start 2P',monospace;font-size:.5rem;color:rgba(123,199,77,.5);letter-spacing:3px}
#nameIn{
  background:rgba(0,0,0,.7);border:2px solid #7bc74d;border-radius:4px;
  padding:12px 20px;color:#fff;font-family:'Press Start 2P',monospace;font-size:.7rem;
  outline:none;text-align:center;width:280px;letter-spacing:2px;
}
#nameIn:focus{box-shadow:0 0 15px rgba(123,199,77,.4)}
#enterBtn{
  background:#7bc74d;border:none;border-radius:4px;padding:12px 28px;
  color:#1a3a0a;font-family:'Press Start 2P',monospace;font-size:.6rem;
  cursor:pointer;letter-spacing:2px;transition:all .1s;
}
#enterBtn:hover{background:#9de06a;transform:translateY(-2px);box-shadow:0 4px 0 #2a5c10}
#enterBtn:active{transform:translateY(0);box-shadow:none}

/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10}
#topBar{
  position:absolute;top:0;left:0;right:0;padding:8px 14px;
  display:flex;align-items:center;gap:10px;
  background:linear-gradient(to bottom,rgba(0,0,0,.8),transparent);
}
.hudLogo{font-family:'Press Start 2P',monospace;font-size:.7rem;color:#7bc74d;text-shadow:1px 1px 0 #2a5c10}
.hudBadge{background:rgba(0,0,0,.6);border:1px solid rgba(123,199,77,.3);border-radius:3px;padding:4px 10px;font-family:'Press Start 2P',monospace;font-size:.45rem;color:#7bc74d}
.hudLink{pointer-events:all;background:rgba(0,0,0,.5);border:1px solid rgba(123,199,77,.3);border-radius:3px;padding:5px 10px;font-family:'Press Start 2P',monospace;font-size:.42rem;color:rgba(123,199,77,.8);text-decoration:none;cursor:pointer;transition:all .15s}
.hudLink:hover{background:rgba(123,199,77,.15);border-color:#7bc74d;color:#7bc74d}
#onlineBadge{margin-left:auto;font-family:'Press Start 2P',monospace;font-size:.42rem;color:rgba(123,199,77,.6)}

/* CHAT */
#chatBox{position:absolute;bottom:50px;left:12px;width:260px}
#chatMsgs{height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:2px;padding:4px;scrollbar-width:none}
#chatMsgs::-webkit-scrollbar{display:none}
.chatMsg{font-family:'VT323',monospace;font-size:1rem;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.55);line-height:1.3;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(2px)}to{opacity:1}}
.chatMsg.sys{color:rgba(255,255,255,.35);font-style:italic;background:transparent}
#chatRow{display:flex;gap:5px;margin-top:4px}
#chatIn{flex:1;background:rgba(0,0,0,.7);border:1px solid rgba(123,199,77,.35);border-radius:3px;padding:6px 8px;color:#fff;font-family:'VT323',monospace;font-size:.95rem;outline:none}
#chatIn:focus{border-color:#7bc74d}
#chatSend{background:rgba(123,199,77,.2);border:1px solid rgba(123,199,77,.4);border-radius:3px;padding:6px 10px;color:#7bc74d;cursor:pointer;font-size:.85rem;pointer-events:all}
#chatSend:hover{background:rgba(123,199,77,.35)}

/* MINIMAP */
#mm{position:absolute;bottom:14px;right:14px;border:1px solid rgba(123,199,77,.35);border-radius:3px}

/* CONTROLS */
#controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  display:flex;gap:10px;background:rgba(0,0,0,.6);border:1px solid rgba(123,199,77,.2);
  border-radius:20px;padding:6px 16px;font-family:'Press Start 2P',monospace;font-size:.38rem;color:rgba(255,255,255,.4)}
.kkey{color:#7bc74d;margin-right:3px}

/* PROMPT */
#prompt{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.8);border:1px solid #7bc74d;border-radius:4px;
  padding:7px 16px;font-family:'Press Start 2P',monospace;font-size:.5rem;
  color:#7bc74d;display:none;white-space:nowrap;animation:fadeIn .15s}

/* DIALOGUE */
#dlg{position:absolute;bottom:54px;left:50%;transform:translateX(-50%);
  width:min(540px,85vw);background:rgba(5,15,5,.95);border:2px solid #7bc74d;
  border-radius:6px;padding:14px 18px;display:none;animation:fadeIn .15s}
#dlgName{font-family:'Press Start 2P',monospace;font-size:.55rem;margin-bottom:8px}
#dlgText{font-family:'VT323',monospace;font-size:1.2rem;color:rgba(255,255,255,.85);line-height:1.5}
#dlgHint{font-family:'Press Start 2P',monospace;font-size:.38rem;color:rgba(255,255,255,.25);margin-top:8px}

/* ZONE LABEL */
#zoneLabel{position:absolute;top:54px;left:50%;transform:translateX(-50%);
  font-family:'Press Start 2P',monospace;font-size:.5rem;color:rgba(180,120,255,.6);
  letter-spacing:3px;display:none}

/* PANEL */
#panel{position:fixed;inset:0;background:rgba(5,10,5,.96);z-index:50;
  display:none;flex-direction:column;align-items:center;padding:30px 20px 60px;
  overflow-y:auto;animation:fadeIn .2s ease}
#panelHead{width:100%;max-width:820px;display:flex;align-items:center;gap:14px;margin-bottom:24px}
#panelIcon{font-size:2rem;width:56px;height:56px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;border:2px solid transparent}
#panelName{font-family:'Press Start 2P',monospace;font-size:.9rem}
#panelDesc{font-family:'VT323',monospace;font-size:1rem;color:rgba(255,255,255,.4);margin-top:4px}
#panelClose{margin-left:auto;background:rgba(255,50,50,.1);border:1px solid rgba(255,50,50,.3);color:#ff5555;border-radius:4px;width:36px;height:36px;font-size:1rem;cursor:pointer;pointer-events:all;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#panelClose:hover{background:rgba(255,50,50,.25)}
#gamesGrid{width:100%;max-width:820px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.gameCard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:16px;cursor:pointer;pointer-events:all;transition:all .18s}
.gameCard:hover{transform:translateY(-3px);border-color:rgba(123,199,77,.35)}
.gameCard .gtype{font-family:'Press Start 2P',monospace;font-size:.38rem;margin-bottom:6px;letter-spacing:1px}
.gameCard h3{font-family:'VT323',monospace;font-size:1.3rem;margin-bottom:3px}
.gameCard p{font-family:'VT323',monospace;font-size:1rem;color:rgba(255,255,255,.4)}
.cardFoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)}
.cardAuth{font-family:'VT323',monospace;font-size:.88rem;color:rgba(255,255,255,.3)}
.playBtn{background:#7bc74d;border:none;border-radius:3px;padding:5px 12px;font-family:'Press Start 2P',monospace;font-size:.38rem;color:#1a3a0a;cursor:pointer}
.playBtn:hover{background:#9de06a}
#newGameBtn{width:100%;max-width:820px;margin-top:12px;padding:14px;
  background:rgba(123,199,77,.05);border:2px dashed rgba(123,199,77,.25);border-radius:6px;
  cursor:pointer;pointer-events:all;font-family:'Press Start 2P',monospace;font-size:.45rem;
  letter-spacing:2px;color:rgba(123,199,77,.5);display:flex;align-items:center;justify-content:center;gap:8px}
#newGameBtn:hover{background:rgba(123,199,77,.12);border-color:rgba(123,199,77,.5);color:#7bc74d}
</style>
</head>
<body>

<div id="nameScreen">
  <h1>GAMEUP</h1>
  <p>SCEGLI IL TUO NOME</p>
  <input id="nameIn" type="text" placeholder="es: Mario" maxlength="16" autocomplete="off">
  <button id="enterBtn">ENTRA NEL VILLAGGIO</button>
</div>

<canvas id="c"></canvas>

<div id="hud">
  <div id="topBar">
    <span class="hudLogo">GAMEUP</span>
    <div class="hudBadge">👤 <span id="hudName">—</span></div>
    <div id="onlineBadge">🟢 <span id="onlineNum">1</span> online</div>
    <a href="forum.html" class="hudLink">💬 FORUM</a>
    <a href="create.html" class="hudLink">＋ CREA</a>
  </div>
  <div id="chatBox">
    <div id="chatMsgs"></div>
    <div id="chatRow">
      <input id="chatIn" type="text" placeholder="[T] per chattare..." maxlength="120">
      <button id="chatSend">➤</button>
    </div>
  </div>
  <canvas id="mm" width="120" height="96"></canvas>
  <div id="controls">
    <span><span class="kkey">WASD</span>muovi</span>
    <span><span class="kkey">E</span>interagisci</span>
    <span><span class="kkey">T</span>chat</span>
    <span><span class="kkey">ESC</span>chiudi</span>
  </div>
  <div id="prompt"></div>
  <div id="dlg">
    <div id="dlgName"></div>
    <div id="dlgText"></div>
    <div id="dlgHint">[E] per chiudere</div>
  </div>
  <div id="zoneLabel"></div>
</div>

<div id="panel">
  <div id="panelHead">
    <div id="panelIcon"></div>
    <div><div id="panelName"></div><div id="panelDesc"></div></div>
    <button id="panelClose">✕</button>
  </div>
  <div id="gamesGrid"></div>
  <button id="newGameBtn">＋ CREA UN NUOVO GIOCO</button>
</div>

<script>
'use strict';

// ── CONFIGURAZIONE ────────────────────────────────────────────
// ============================================================
//  GameUp Storage — prova server, fallback su localStorage
// ============================================================
const _HOST = window.location.hostname || 'localhost';
const API   = `http://${_HOST}:8080`;

const LS_KEY = 'gameup_games';

function lsGetAll(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)||'[]'); }catch{ return []; }
}
function lsSave(games){
  localStorage.setItem(LS_KEY, JSON.stringify(games));
}
function lsNextId(){
  const all=lsGetAll();
  return all.length ? Math.max(...all.map(g=>g.id||0))+1 : 1;
}

const GS = {
  // Carica tutti i giochi (opz. filtra per subject)
  async getGames(subject){
    try{
      const url=subject?`${API}/games?subject=${subject}`:`${API}/games`;
      const r=await fetch(url,{signal:AbortSignal.timeout(2500)});
      if(r.ok){ const data=await r.json(); if(Array.isArray(data)&&data.length>0) return data; }
    }catch{}
    // fallback localStorage
    let all=lsGetAll();
    if(subject) all=all.filter(g=>g.subject===subject);
    return all;
  },

  // Carica un gioco per ID
  async getGame(id){
    try{
      const r=await fetch(`${API}/games/${id}`,{signal:AbortSignal.timeout(2500)});
      if(r.ok){ const data=await r.json(); if(data&&data.id) return data; }
    }catch{}
    // fallback localStorage
    return lsGetAll().find(g=>String(g.id)===String(id))||null;
  },

  // Salva un nuovo gioco
  async saveGame(payload){
    try{
      const r=await fetch(`${API}/games`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload),signal:AbortSignal.timeout(3000)
      });
      if(r.ok){ const data=await r.json(); if(data&&data.id){
        // salva anche in localStorage come cache
        const all=lsGetAll();
        all.push({...payload,id:data.id,plays:0,created_at:new Date().toISOString()});
        lsSave(all);
        return {id:data.id, source:'server'};
      }}
    }catch{}
    // fallback localStorage
    const newId=lsNextId();
    const game={...payload,id:newId,plays:0,created_at:new Date().toISOString()};
    const all=lsGetAll();all.push(game);lsSave(all);
    return {id:newId, source:'local'};
  },

  // Incrementa plays
  async incrementPlay(id){
    try{ fetch(`${API}/games/${id}/play`,{method:'POST'}); }catch{}
    // aggiorna anche localStorage
    const all=lsGetAll();
    const g=all.find(g=>String(g.id)===String(id));
    if(g){g.plays=(g.plays||0)+1;lsSave(all);}
  }
};

const WS_URL = `ws://${_HOST}:3000`;

const TS = 32;   // tile size in pixel

// ── TIPI DI TILE ──────────────────────────────────────────────
const T = { GRASS:0, GRASS2:1, PATH:2, STONE:3, WATER:4, TREE:0x10, FLOWER:0x11, SECRET:0x12, MGRASS:0x20, MWATER:0x21, MTREE:0x22, MSTONE:0x23, MRETURN:0x24 };

// ── MAPPA VILLAGGIO 64×64 ─────────────────────────────────────
const MW=64, MH=64;      // dimensioni mappa villaggio
const SMW=36, SMH=28;    // dimensioni mappa segreta
const CX=32, CY=32;      // centro villaggio

// LCG per numeri pseudo-casuali deterministici (stesso seed = stessa mappa)
function lcg(seed){ return function(){ seed=(seed*1664525+1013904223)&0xffffffff; return (seed>>>0)/0xffffffff; }; }

function buildVillage(){
  const m = new Uint8Array(MW*MH).fill(T.GRASS);
  const set=(x,y,t)=>{ if(x>=0&&x<MW&&y>=0&&y<MH) m[y*MW+x]=t; };
  const fill=(x0,y0,x1,y1,t)=>{ for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++) set(x,y,t); };

  // Bordo foresta
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++)
    if(x<3||x>MW-4||y<3||y>MH-4) set(x,y,T.TREE);

  // Piazza centrale in pietra (raggio 7)
  for(let dy=-8;dy<=8;dy++) for(let dx=-8;dx<=8;dx++){
    const d=Math.hypot(dx,dy);
    if(d<7) set(CX+dx,CY+dy,T.STONE);
  }

  // Strade principali
  for(let x=3;x<MW-3;x++) if(m[CY*MW+x]===T.GRASS||m[CY*MW+x]===T.STONE) set(x,CY,T.PATH);
  for(let y=3;y<MH-3;y++) if(m[y*MW+CX]===T.GRASS||m[y*MW+CX]===T.STONE) set(CX,y,T.PATH);
  // Strade diagonali
  for(let i=1;i<=14;i++){ set(CX-i,CY-i,T.PATH); set(CX+i,CY-i,T.PATH); set(CX-i,CY+i,T.PATH); set(CX+i,CY+i,T.PATH); }

  // Lago NW
  for(let dy=-5;dy<=5;dy++) for(let dx=-6;dx<=5;dx++)
    if(Math.hypot(dx,dy)<5.2) set(10+dx,11+dy,T.WATER);

  // Via segreta (tile speciali nel bordo sud)
  set(CX-1,MH-4,T.GRASS); set(CX,MH-4,T.SECRET); set(CX+1,MH-4,T.GRASS);
  set(CX-1,MH-3,T.GRASS); set(CX,MH-3,T.SECRET); set(CX+1,MH-3,T.GRASS);

  // Alberi casuali
  const rng=lcg(42);
  for(let i=0;i<300;i++){
    const tx=(4+rng()*(MW-8))|0, ty=(4+rng()*(MH-8))|0;
    if(m[ty*MW+tx]===T.GRASS) set(tx,ty,T.TREE);
  }

  // Fiori
  for(let y=4;y<MH-4;y++) for(let x=4;x<MW-4;x++)
    if(m[y*MW+x]===T.GRASS && lcg(x*1000+y*7)()<0.045) set(x,y,T.FLOWER);

  return m;
}

function buildSecret(){
  const m = new Uint8Array(SMW*SMH).fill(T.MGRASS);
  const set=(x,y,t)=>{ if(x>=0&&x<SMW&&y>=0&&y<SMH) m[y*SMW+x]=t; };
  const SCX=18, SCY=14;

  // Bordo alberi magici
  for(let y=0;y<SMH;y++) for(let x=0;x<SMW;x++)
    if(x<2||x>SMW-3||y<2||y>SMH-3) set(x,y,T.MTREE);

  // Lago magico
  for(let dy=-5;dy<=5;dy++) for(let dx=-5;dx<=5;dx++)
    if(Math.hypot(dx,dy)<4.8) set(SCX+dx,SCY+dy,T.MWATER);

  // Portale di ritorno
  set(SCX,2,T.MRETURN);
  for(let y=3;y<SCY-5;y++) set(SCX,y,T.MSTONE);

  // Fiori magici
  const rng=lcg(999);
  for(let y=2;y<SMH-2;y++) for(let x=2;x<SMW-2;x++)
    if(m[y*SMW+x]===T.MGRASS && rng()<0.12) set(x,y,T.FLOWER);

  return m;
}

const VMAP = buildVillage();
const SMAP = buildSecret();
const SCX_S=18, SCY_S=14; // centro mappa segreta

// ── EDIFICI ───────────────────────────────────────────────────
const BUILDINGS = [
  {id:'storia',     name:'STORIA',      icon:'🏛',desc:'Civiltà del passato',   wall:'#c89040',roof:'#8a6020',subject:'storia',     tx:8, ty:8, tw:6,th:5},
  {id:'matematica', name:'MATEMATICA',  icon:'📐',desc:'Sfida il tuo cervello', wall:'#4070cc',roof:'#204890',subject:'matematica',  tx:50,ty:8, tw:6,th:5},
  {id:'scienze',    name:'SCIENZE',     icon:'🔬',desc:'Segreti della natura',  wall:'#30a050',roof:'#187030',subject:'scienze',     tx:52,ty:22,tw:5,th:4},
  {id:'letteratura',name:'LETTERATURA', icon:'📚',desc:'Viaggia tra le parole', wall:'#cc3060',roof:'#8a1040',subject:'letteratura', tx:48,ty:46,tw:6,th:5},
  {id:'geografia',  name:'GEOGRAFIA',   icon:'🌍',desc:'Esplora il mondo',     wall:'#8030cc',roof:'#5010a0',subject:'geografia',   tx:8, ty:48,tw:6,th:5},
  {id:'informatica',name:'INFORMATICA', icon:'💻',desc:'Programma il futuro',  wall:'#20a8c0',roof:'#107080',subject:'informatica', tx:3, ty:20,tw:5,th:4},
];

// ── NPC ───────────────────────────────────────────────────────
function makeNPC(name,color,hair,dlg,wps,spd){
  return {name,color,hair,dlg,dlgIdx:0,wps,wpIdx:0,spd,
    x:wps[0][0],y:wps[0][1],walkF:0,walkT:0};
}
const NPCS = [
  makeNPC('Nonna Rosa','#e87090','#8a3050',
    ['Benvenuto nel villaggio! 🌸','La fontana porta fortuna a chi studia!','Ogni edificio ha giochi fatti dagli studenti.'],
    [[CX-3,CY+3],[CX+3,CY+3],[CX+3,CY-3],[CX-3,CY-3]],0.7),
  makeNPC('Prof. Archimede','#4488ee','#eee8a8',
    ['I numeri non mentono mai! 📐','Prova il Quiz di Matematica!','Le equazioni sono puzzle logici.'],
    [[51,11],[56,11],[56,16],[51,16]],0.8),
  makeNPC('Sig.ra Elena','#dd4466','#5a3010',
    ['Ogni libro è un viaggio! 📚','La letteratura apre la mente!','Leggere è la forma più alta di avventura.'],
    [[49,48],[54,48],[54,52],[49,52]],0.75),
  makeNPC('Il Guardaboschi','#508040','#6a4020',
    ['Pssst... 🌲','Hai esplorato il confine sud?','...c\'è qualcosa di strano laggiù. *sorride*'],
    [[CX-4,MH-9],[CX+4,MH-9],[CX+4,MH-7],[CX-4,MH-7]],0.6),
];
const SECRET_NPC = makeNPC('Mago Stellare','#a050ee','#c8c0ff',
  ['Hai trovato il Giardino Segreto! ✨','Qui nascono i giochi più speciali...','La conoscenza è la vera magia.'],
  [[SCX_S-4,SCY_S-4],[SCX_S+4,SCY_S-4],[SCX_S+4,SCY_S+4],[SCX_S-4,SCY_S+4]],0.5);

// ── STATO ─────────────────────────────────────────────────────
let zone=0;            // 0=villaggio 1=segreto
let myName='';
let myId=null, myColor='#7bc74d';
let chatMode=false, panelOpen=false;
let fadeAlpha=0, fadeTo=-1;
let gameTime=0;
let nearBuilding=null, nearNPC=null;
let activeDlg=null;
let currentSubject=null;
let ws=null;
const keys={};
const others=new Map();
const particles=[];

const player={x:CX,y:CY+2,walkF:0,walkT:0,dir:2};

const cam={x:CX,y:CY};

// ── CANVAS ────────────────────────────────────────────────────
const cv=document.getElementById('c');
const cx=cv.getContext('2d');
cx.imageSmoothingEnabled=false;
const mmCv=document.getElementById('mm');
const mmCx=mmCv.getContext('2d');

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;cx.imageSmoothingEnabled=false;}
window.addEventListener('resize',resize);resize();

// ── INPUT ─────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(chatMode){e.stopPropagation();return;}
  if(panelOpen&&e.code==='Escape'){closePanel();return;}
  if(activeDlg&&e.code==='KeyE'){e.preventDefault();closeDlg();return;}
  if(e.code==='KeyT'){e.preventDefault();startChat();return;}
  if(e.code==='KeyE'){e.preventDefault();interact();return;}
  keys[e.code]=true;
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
document.getElementById('chatIn').addEventListener('keydown',e=>{
  e.stopPropagation();
  if(e.key==='Enter'){sendChat();}
  if(e.key==='Escape'){stopChat();}
});
document.getElementById('chatSend').addEventListener('click',sendChat);
function startChat(){chatMode=true;document.getElementById('chatIn').focus();}
function stopChat(){chatMode=false;document.getElementById('chatIn').blur();}

// ── WEBSOCKET ─────────────────────────────────────────────────
function initWS(){
  try{
    ws=new WebSocket(WS_URL);
    ws.onopen=()=>addSys('🌿 Connesso al mondo');
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type==='welcome'){
        myId=m.yourId;myColor=m.yourColor;
        m.players.forEach(p=>others.set(p.id,{x:p.x,y:p.y,tx:p.x,ty:p.y,name:p.name,color:p.color,walkF:0,walkT:0}));
        ws.send(JSON.stringify({type:'set_name',name:myName}));
        updOnline();
      } else if(m.type==='player_joined'){
        others.set(m.player.id,{x:m.player.x,y:m.player.y,tx:m.player.x,ty:m.player.y,name:m.player.name,color:m.player.color,walkF:0,walkT:0});
        updOnline();
      } else if(m.type==='player_left'){others.delete(m.id);updOnline();}
      else if(m.type==='player_moved'){const p=others.get(m.id);if(p){p.tx=m.x;p.ty=m.y;}}
      else if(m.type==='chat'){addChat(m);}
    };
    ws.onclose=()=>addSys('⚠️ Disconnesso dal server');
    ws.onerror=()=>addSys('⚠️ Offline — modalità locale');
  }catch(e){addSys('⚠️ WebSocket non disponibile');}
}
function wsSend(d){if(ws&&ws.readyState===1)ws.send(JSON.stringify(d));}
let lastSentPos={x:-999,y:-999};
setInterval(()=>{
  const rx=Math.round(player.x*4)/4,ry=Math.round(player.y*4)/4;
  if(rx!==lastSentPos.x||ry!==lastSentPos.y){wsSend({type:'move',x:rx,y:ry});lastSentPos={x:rx,y:ry};}
},100);
function updOnline(){document.getElementById('onlineNum').textContent=others.size+1;}

// ── CHAT ─────────────────────────────────────────────────────
const chatMsgs=document.getElementById('chatMsgs');
function addSys(t){const d=document.createElement('div');d.className='chatMsg sys';d.textContent=t;chatMsgs.appendChild(d);trimChat();chatMsgs.scrollTop=9999;}
function addChat(m){
  const d=document.createElement('div');d.className='chatMsg';
  d.innerHTML=`<span style="color:${m.color||'#7bc74d'};font-weight:bold">${m.id===myId?'(tu) ':''} ${m.name}:</span> ${m.text}`;
  chatMsgs.appendChild(d);trimChat();chatMsgs.scrollTop=9999;
}
function trimChat(){while(chatMsgs.children.length>40)chatMsgs.removeChild(chatMsgs.firstChild);}
function sendChat(){
  const ci=document.getElementById('chatIn'),t=ci.value.trim();
  if(!t){stopChat();return;}
  wsSend({type:'chat',text:t});ci.value='';
}

// ── COLLISIONE ────────────────────────────────────────────────
function solid(wx,wy){
  const map=zone===0?VMAP:SMAP;
  const mw=zone===0?MW:SMW, mh=zone===0?MH:SMH;
  const tx=Math.floor(wx), ty=Math.floor(wy);
  if(tx<0||tx>=mw||ty<0||ty>=mh)return true;
  const t=map[ty*mw+tx];
  if(t===T.TREE||t===T.MTREE||t===T.WATER||t===T.MWATER)return true;
  // Edifici solidi
  const blist=zone===0?BUILDINGS:[];
  for(const b of blist)if(tx>=b.tx&&tx<b.tx+b.tw&&ty>=b.ty&&ty<b.ty+b.th)return true;
  // Fontana solida (3×3 intorno al centro)
  const fcx=zone===0?CX:SCX_S, fcy=zone===0?CY:SCY_S;
  if(tx>=fcx-1&&tx<=fcx+1&&ty>=fcy-1&&ty<=fcy+1)return true;
  return false;
}

// ── UPDATE PLAYER ─────────────────────────────────────────────
function updatePlayer(dt){
  if(activeDlg||panelOpen||chatMode)return;
  let mx=0,my=0;
  if(keys['KeyW']||keys['ArrowUp'])   my=-1;
  if(keys['KeyS']||keys['ArrowDown']) my=1;
  if(keys['KeyA']||keys['ArrowLeft']) mx=-1;
  if(keys['KeyD']||keys['ArrowRight'])mx=1;
  if(mx&&my){mx*=0.7071;my*=0.7071;}
  if(my<0)player.dir=3;else if(my>0)player.dir=2;
  else if(mx<0)player.dir=1;else if(mx>0)player.dir=0;
  const spd=3.5*dt;
  if(mx||my){
    const nx=player.x+mx*spd;if(!solid(nx,player.y))player.x=nx;
    const ny=player.y+my*spd;if(!solid(player.x,ny))player.y=ny;
    player.walkT+=dt;if(player.walkT>0.15){player.walkF=(player.walkF+1)%4;player.walkT=0;}
  }
  // Transizione zona
  const map=zone===0?VMAP:SMAP;
  const mw=zone===0?MW:SMW;
  const tx=Math.floor(player.x),ty=Math.floor(player.y);
  if(zone===0&&tx>=0&&tx<MW&&ty>=0&&ty<MH&&VMAP[ty*MW+tx]===T.SECRET)startFade(1);
  if(zone===1&&tx>=0&&tx<SMW&&ty>=0&&ty<SMH&&SMAP[ty*SMW+tx]===T.MRETURN)startFade(0);
  checkNear();
}

function checkNear(){
  nearBuilding=null;nearNPC=null;
  if(zone===0){
    for(const b of BUILDINGS){
      const doorX=b.tx+b.tw/2-0.5, doorY=b.ty+b.th+0.5;
      if(Math.hypot(player.x-doorX,player.y-doorY)<2.2){nearBuilding=b;break;}
    }
  }
  const nlist=zone===0?NPCS:[SECRET_NPC];
  for(const n of nlist){
    if(Math.hypot(player.x-n.x,player.y-n.y)<2.2){nearNPC=n;break;}
  }
  const pr=document.getElementById('prompt');
  if(activeDlg){pr.style.display='none';return;}
  if(nearBuilding){pr.textContent=`[ E ] Entra: ${nearBuilding.name}`;pr.style.display='block';}
  else if(nearNPC){pr.textContent=`[ E ] Parla con ${nearNPC.name}`;pr.style.display='block';}
  else pr.style.display='none';
}

function interact(){
  if(activeDlg){closeDlg();return;}
  if(panelOpen){closePanel();return;}
  if(nearBuilding){openPanel(nearBuilding);return;}
  if(nearNPC){openDlg(nearNPC);return;}
}

function openDlg(npc){
  document.getElementById('dlgName').textContent=npc.name;
  document.getElementById('dlgName').style.color=npc.color;
  document.getElementById('dlgText').textContent=npc.dlg[npc.dlgIdx%npc.dlg.length];
  npc.dlgIdx++;
  document.getElementById('dlg').style.display='block';
  activeDlg=npc;
}
function closeDlg(){document.getElementById('dlg').style.display='none';activeDlg=null;}

// ── UPDATE NPC ────────────────────────────────────────────────
function updateNPCs(dt){
  const nlist=zone===0?NPCS:[SECRET_NPC];
  for(const n of nlist){
    if(Math.hypot(player.x-n.x,player.y-n.y)<2.5)continue;
    const wp=n.wps[n.wpIdx];
    const dx=wp[0]-n.x, dy=wp[1]-n.y, d=Math.hypot(dx,dy);
    if(d<0.1){n.wpIdx=(n.wpIdx+1)%n.wps.length;continue;}
    const spd=n.spd*dt;
    n.x+=dx/d*spd;n.y+=dy/d*spd;
    n.walkT+=dt;if(n.walkT>0.2){n.walkF=(n.walkF+1)%4;n.walkT=0;}
  }
  others.forEach(p=>{
    if(p.tx!==undefined){
      p.x+=(p.tx-p.x)*0.18;p.y+=(p.ty-p.y)*0.18;
    }
  });
}

// ── PARTICELLE ────────────────────────────────────────────────
function spawnFountain(){
  const fcx=zone===0?CX+0.5:SCX_S+0.5, fcy=zone===0?CY+0.5:SCY_S+0.5;
  const ang=(Math.random()*1.4-0.7)-Math.PI/2;
  const spd=2+Math.random()*2;
  particles.push({x:fcx,y:fcy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    gravity:5,life:0.8+Math.random()*0.4,maxLife:1.2,
    color:zone===0?'#88bbff':' #cc88ff',size:3});
}
function spawnSparkle(){
  particles.push({x:2+Math.random()*(SMW-4),y:2+Math.random()*(SMH-4),
    vx:(Math.random()-.5),vy:-1-Math.random()*1.5,gravity:0.3,
    life:0.6+Math.random()*0.5,maxLife:1.1,
    color:['#ffff80','#ff80ff','#80ffff'][Math.floor(Math.random()*3)],size:2.5});
}
function updateParticles(dt){
  if(Math.random()<dt*10)spawnFountain();
  if(zone===1&&Math.random()<dt*12)spawnSparkle();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=p.gravity*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── CAMERA ────────────────────────────────────────────────────
function updateCam(){
  cam.x+=(player.x-cam.x)*0.09;
  cam.y+=(player.y-cam.y)*0.09;
}

// ── FADE ──────────────────────────────────────────────────────
function startFade(toZone){if(fadeTo!==-1)return;fadeTo=toZone;}
function updateFade(dt){
  if(fadeTo===-1&&fadeAlpha<=0)return;
  if(fadeTo!==-1){
    fadeAlpha=Math.min(1,fadeAlpha+dt*2.5);
    if(fadeAlpha>=1){
      zone=fadeTo;fadeTo=-1;particles.length=0;
      if(zone===1){
        player.x=SCX_S;player.y=SMH-4;cam.x=SCX_S;cam.y=SMH-4;
        addSys('✨ Hai trovato il Giardino Segreto!');
        document.getElementById('zoneLabel').textContent='✦ GIARDINO SEGRETO ✦';
        document.getElementById('zoneLabel').style.display='block';
      }else{
        player.x=CX;player.y=MH-7;cam.x=CX;cam.y=MH-7;
        addSys('🌿 Sei tornato nel villaggio.');
        document.getElementById('zoneLabel').style.display='none';
      }
    }
  }else{fadeAlpha=Math.max(0,fadeAlpha-dt*2.5);}
}

// ── RENDER HELPER ─────────────────────────────────────────────
// Converte coordinate mondo (tile) → coordinate schermo (pixel)
function t2s(wx,wy){
  return [
    Math.round((wx-cam.x)*TS+cv.width/2),
    Math.round((wy-cam.y)*TS+cv.height/2)
  ];
}

// ── DISEGNO TILE ──────────────────────────────────────────────
function drawTile(type,wx,wy){
  const [sx,sy]=t2s(wx,wy);
  const S=TS;
  // Culling fuori schermo
  if(sx>cv.width+S||sx<-S||sy>cv.height+S||sy<-S)return;

  // Variazione colore deterministica
  const hash=((wx*374761393+wy*668265263)^(wx*wy))>>>0;
  const v=hash%3;

  if(type===T.GRASS||type===T.GRASS2){
    cx.fillStyle=v===0?'#5aab34':v===1?'#52a02e':'#4e9629';
    cx.fillRect(sx,sy,S,S);
    // Fili d'erba
    if(hash%6===0){cx.fillStyle='#6dc040';cx.fillRect(sx+(hash%11)+2,sy+(hash%9)+4,2,6);}
    if(hash%8===0){cx.fillStyle='#3e8020';cx.fillRect(sx+(hash%13)+5,sy+(hash%7)+3,1,5);}
  }
  else if(type===T.PATH){
    cx.fillStyle=v===0?'#a89070':'#9a8468';
    cx.fillRect(sx,sy,S,S);
    // Bordi mattone
    cx.strokeStyle='rgba(0,0,0,.12)';cx.lineWidth=0.8;
    const off=(wy%2)*(S/2);
    cx.strokeRect(sx+off%S+1,sy+1,S/2-1,S-2);
  }
  else if(type===T.STONE){
    cx.fillStyle=v===0?'#909090':'#888080';
    cx.fillRect(sx,sy,S,S);
    cx.fillStyle='rgba(255,255,255,.1)';cx.fillRect(sx,sy,S,2);cx.fillRect(sx,sy,2,S);
    cx.fillStyle='rgba(0,0,0,.12)';cx.fillRect(sx,sy+S-2,S,2);cx.fillRect(sx+S-2,sy,2,S);
  }
  else if(type===T.WATER){
    cx.fillStyle='#3070c0';cx.fillRect(sx,sy,S,S);
    const wy0=(Math.sin(gameTime*1.5+wx*.8+wy*.4)*3+5)|0;
    cx.fillStyle='rgba(100,180,255,.3)';cx.fillRect(sx+2,sy+wy0,S-4,3);cx.fillRect(sx+6,sy+wy0+9,S-12,2);
  }
  else if(type===T.FLOWER){
    // Prima disegna erba sotto
    cx.fillStyle='#5aab34';cx.fillRect(sx,sy,S,S);
    const sway=Math.sin(gameTime*2+wx+wy)*1.5;
    // Stelo
    cx.fillStyle='#3a6020';cx.fillRect(sx+S/2-1,sy+S/2+1,2,S/2-4);
    // Fiore
    const fc=['#ff6666','#ffcc30','#ff88ff','#eeeeee','#ff8840','#44dddd'][hash%6];
    cx.fillStyle=fc;
    cx.beginPath();cx.arc(sx+S/2+sway,sy+S/2-2,5,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fff88a';cx.beginPath();cx.arc(sx+S/2+sway,sy+S/2-2,2.5,0,Math.PI*2);cx.fill();
  }
  else if(type===T.SECRET){
    cx.fillStyle=v===0?'#304a28':'#385430';cx.fillRect(sx,sy,S,S);
    const glw=0.08+Math.sin(gameTime*2.5+wx+wy)*0.04;
    cx.fillStyle=`rgba(80,0,120,${glw})`;cx.fillRect(sx,sy,S,S);
  }
  else if(type===T.MGRASS){
    cx.fillStyle=v===0?'#4020a0':v===1?'#502ab0':'#3818 90';
    cx.fillStyle=v===0?'#4020a0':v===1?'#502ab0':'#381890';
    cx.fillRect(sx,sy,S,S);
    if(hash%6===0){cx.fillStyle='rgba(180,100,255,.2)';cx.fillRect(sx,sy,S,S);}
  }
  else if(type===T.MWATER){
    cx.fillStyle='#3010a0';cx.fillRect(sx,sy,S,S);
    const wy0=(Math.sin(gameTime*1.2+wx+wy)*3+6)|0;
    cx.fillStyle='rgba(180,100,255,.35)';cx.fillRect(sx+2,sy+wy0,S-4,3);
  }
  else if(type===T.MSTONE){
    cx.fillStyle='#402860';cx.fillRect(sx,sy,S,S);
    cx.fillStyle='rgba(200,150,255,.12)';cx.fillRect(sx+2,sy+2,S-4,S/2-3);
  }
  else if(type===T.MRETURN){
    cx.fillStyle='#1810a0';cx.fillRect(sx,sy,S,S);
    const glow=0.6+Math.sin(gameTime*3)*0.3;
    cx.fillStyle=`rgba(150,100,255,${glow})`;
    cx.beginPath();cx.arc(sx+S/2,sy+S/2,S*.38,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(220,200,255,.9)';
    cx.beginPath();cx.arc(sx+S/2,sy+S/2,S*.2,0,Math.PI*2);cx.fill();
    cx.fillStyle='#fff';cx.font=`bold ${S*.45}px monospace`;cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText('↑',sx+S/2,sy+S/2+1);
    cx.textBaseline='alphabetic';
  }
  else{// fallback erba
    cx.fillStyle='#5aab34';cx.fillRect(sx,sy,S,S);
  }
}

// ── DISEGNO ALBERO ────────────────────────────────────────────
function drawTree(wx,wy,magic){
  const [sx,sy]=t2s(wx,wy);
  const S=TS;
  if(sx>cv.width+S*2||sx<-S*2||sy>cv.height+S*2||sy<-S*2)return;
  // Ombra
  cx.fillStyle='rgba(0,0,0,.18)';
  cx.beginPath();cx.ellipse(sx+S/2,sy+S-2,S*.55,S*.18,0,0,Math.PI*2);cx.fill();
  // Tronco
  cx.fillStyle=magic?'#3a1870':'#7a5230';
  cx.fillRect(sx+S/2-4,sy+S*.5,8,S*.5+2);
  // Chioma 3 livelli (depth)
  const c0=magic?'#200860':'#1a5010';
  const c1=magic?'#401888':'#2a7018';
  const c2=magic?'#6030b0':'#3a8828';
  const c3=magic?'#8848d0':'#4aa838';
  cx.fillStyle=c0;cx.beginPath();cx.arc(sx+S/2,sy+S*.42,S*.5,0,Math.PI*2);cx.fill();
  cx.fillStyle=c1;cx.beginPath();cx.arc(sx+S/2-S*.18,sy+S*.3,S*.35,0,Math.PI*2);cx.fill();
  cx.fillStyle=c1;cx.beginPath();cx.arc(sx+S/2+S*.18,sy+S*.26,S*.32,0,Math.PI*2);cx.fill();
  cx.fillStyle=c2;cx.beginPath();cx.arc(sx+S/2,sy+S*.16,S*.28,0,Math.PI*2);cx.fill();
  cx.fillStyle=c3;cx.beginPath();cx.arc(sx+S/2,sy+S*.08,S*.18,0,Math.PI*2);cx.fill();
  // Lucciole nell'area segreta
  if(magic&&Math.sin(gameTime*4+wx*0.7+wy*1.3)>0.8){
    const fx=sx+S/2+Math.cos(gameTime*1.5+wx)*S*.45;
    const fy=sy+S*.3+Math.sin(gameTime*2+wy)*S*.22;
    cx.fillStyle='rgba(220,180,255,.9)';
    cx.beginPath();cx.arc(fx,fy,2,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(220,180,255,.3)';
    cx.beginPath();cx.arc(fx,fy,5,0,Math.PI*2);cx.fill();
  }
}

// ── DISEGNO EDIFICIO ──────────────────────────────────────────
function drawBuilding(b){
  const [sx,sy]=t2s(b.tx,b.ty);
  const bw=b.tw*TS, bh=b.th*TS, S=TS;
  if(sx>cv.width+bw||sx<-bw||sy>cv.height+bh||sy<-bh)return;

  // Ombra
  cx.fillStyle='rgba(0,0,0,.22)';
  cx.fillRect(sx+6,sy+10,bw,bh);

  // Corpo
  cx.fillStyle=b.wall;cx.fillRect(sx,sy,bw,bh);

  // Texture mattoni
  cx.strokeStyle='rgba(0,0,0,.15)';cx.lineWidth=1;
  for(let r=0;r<b.th*2;r++){
    const offX=(r%2)*(S/4);
    for(let c=0;c<b.tw*2+1;c++){
      cx.strokeRect(sx+c*(S/2)-offX,sy+r*(S/2),S/2,S/2);
    }
  }

  // Tetto
  cx.fillStyle=b.roof;cx.fillRect(sx-5,sy-S*.4,bw+10,S*.55);
  // Highlight tetto
  cx.fillStyle='rgba(255,255,255,.15)';cx.fillRect(sx-5,sy-S*.4,bw+10,3);
  // Ombra sotto tetto
  cx.fillStyle='rgba(0,0,0,.25)';cx.fillRect(sx-5,sy-S*.4+S*.52,bw+10,3);

  // Finestre
  const ww=S*.3,wh=S*.35;
  cx.fillStyle='#b0d8f5';
  if(b.tw>=2){cx.fillRect(sx+S*.12,sy+S*.2,ww,wh);cx.fillRect(sx+bw-ww-S*.12,sy+S*.2,ww,wh);}
  if(b.tw>=3){cx.fillRect(sx+bw/2-ww/2,sy+S*.2,ww,wh);}
  // Bagliore finestre
  cx.fillStyle='rgba(255,240,160,.2)';
  if(b.tw>=2){cx.fillRect(sx+S*.12,sy+S*.2,ww,wh);cx.fillRect(sx+bw-ww-S*.12,sy+S*.2,ww,wh);}
  // Croce finestra
  cx.fillStyle='rgba(60,100,160,.6)';
  if(b.tw>=2){
    cx.fillRect(sx+S*.12+ww/2-1,sy+S*.2,2,wh);
    cx.fillRect(sx+S*.12,sy+S*.2+wh/2-1,ww,2);
  }

  // Porta
  const dw=S*.4,dh=S*.55;
  const dx=sx+bw/2-dw/2, dy=sy+bh-dh;
  cx.fillStyle='rgba(0,0,0,.6)';cx.fillRect(dx,dy,dw,dh);
  // Arco porta
  cx.fillStyle=b.roof;
  cx.beginPath();cx.arc(dx+dw/2,dy,dw/2,Math.PI,0);cx.fill();
  cx.strokeStyle=b.roof;cx.lineWidth=2;cx.strokeRect(dx,dy,dw,dh);
  // Maniglia
  cx.fillStyle='rgba(255,220,100,.8)';cx.beginPath();cx.arc(dx+dw*.62,dy+dh*.5,2.5,0,Math.PI*2);cx.fill();

  // Insegna
  const sw=Math.min(bw*.7,S*2), sh=S*.25;
  cx.fillStyle='rgba(0,0,0,.7)';
  cx.fillRect(sx+bw/2-sw/2,sy+bh*.38,sw,sh);
  cx.fillStyle='rgba(255,255,255,.08)';
  cx.fillRect(sx+bw/2-sw/2,sy+bh*.38,sw,1);
  cx.fillStyle='#ffffff';cx.font=`bold ${S*.13}px monospace`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText(b.name,sx+bw/2,sy+bh*.38+sh/2);
  cx.textBaseline='alphabetic';

  // Icona
  cx.font=`${S*.65}px serif`;cx.textAlign='center';
  cx.fillText(b.icon,sx+bw/2,sy-S*.42+S*.65);
}

// ── DISEGNO FONTANA ───────────────────────────────────────────
function drawFountain(fx,fy){
  const [sx,sy]=t2s(fx,fy);
  const S=TS;
  // Ombra
  cx.fillStyle='rgba(0,0,0,.2)';
  cx.beginPath();cx.ellipse(sx+S,sy+S+6,S*1.1,S*.36,0,0,Math.PI*2);cx.fill();
  // Bacino esterno
  cx.fillStyle='#6a7080';
  cx.beginPath();cx.ellipse(sx+S,sy+S,S*1.1,S*.38,0,0,Math.PI*2);cx.fill();
  cx.fillStyle='#909aa8';
  cx.beginPath();cx.ellipse(sx+S,sy+S,S*.95,S*.33,0,0,Math.PI*2);cx.fill();
  // Acqua
  const wc=zone===1?'rgba(100,40,200,.88)':'rgba(40,100,210,.88)';
  cx.fillStyle=wc;
  cx.beginPath();cx.ellipse(sx+S,sy+S,S*.88,S*.3,0,0,Math.PI*2);cx.fill();
  // Riflesso
  cx.fillStyle='rgba(255,255,255,.15)';
  cx.beginPath();cx.ellipse(sx+S*.7,sy+S*.88,S*.25,S*.09,-.2,0,Math.PI*2);cx.fill();
  // Colonna
  cx.fillStyle='#787888';cx.fillRect(sx+S-5,sy+S*.1,10,S*.9);
  cx.fillStyle='#9090a0';cx.fillRect(sx+S-8,sy+S*.06,16,S*.15);
  // Ciotola superiore
  cx.fillStyle='#888898';
  cx.beginPath();cx.ellipse(sx+S,sy+S*.22,S*.4,S*.14,0,0,Math.PI*2);cx.fill();
}

// ── DISEGNO PERSONAGGIO ───────────────────────────────────────
function drawChar(wx,wy,color,walkF,label,isLocal,hairColor){
  const [sx,sy]=t2s(wx,wy);
  if(sx>cv.width+50||sx<-50||sy>cv.height+50||sy<-50)return;
  const f=walkF%2, bob=(walkF%4<2)?0:-1;

  // Ombra a terra
  cx.fillStyle='rgba(0,0,0,.22)';
  cx.beginPath();cx.ellipse(sx,sy+8,10,4,0,0,Math.PI*2);cx.fill();

  // Gambe
  cx.fillStyle='#2a2a5a';
  cx.fillRect(sx-5,sy+4+bob,4,8+(f?2:-2));
  cx.fillRect(sx+1,sy+4+bob,4,8+(f?-2:2));
  // Scarpe
  cx.fillStyle='#1a1a3a';
  cx.fillRect(sx-6,sy+10+bob+(f?2:-2),6,3);
  cx.fillRect(sx+1,sy+10+bob+(f?-2:2),6,3);

  // Corpo/maglia
  cx.fillStyle=color;cx.fillRect(sx-7,sy-6+bob,14,11);
  // Colletto
  cx.fillStyle='rgba(255,255,255,.2)';cx.fillRect(sx-2,sy-6+bob,4,2);

  // Braccia
  const a=(walkF>0)?(f?3:-3):0;
  cx.fillStyle=color;
  cx.fillRect(sx-11,sy-4+bob+a,4,9);
  cx.fillRect(sx+7,sy-4+bob-a,4,9);
  // Mani
  cx.fillStyle='#f0c88a';
  cx.fillRect(sx-11,sy+3+bob+a,4,3);
  cx.fillRect(sx+7,sy+3+bob-a,4,3);

  // Collo
  cx.fillStyle='#f0c88a';cx.fillRect(sx-2,sy-8+bob,4,3);

  // Testa
  cx.fillStyle='#f5ca90';cx.fillRect(sx-7,sy-19+bob,14,12);
  // Guance
  cx.fillStyle='rgba(220,140,120,.4)';
  cx.fillRect(sx-6,sy-13+bob,3,3);cx.fillRect(sx+3,sy-13+bob,3,3);

  // Capelli
  const hc=hairColor||'#5a3010';
  cx.fillStyle=hc;
  cx.fillRect(sx-8,sy-20+bob,16,6);
  cx.fillRect(sx-8,sy-18+bob,3,9);
  cx.fillRect(sx+5,sy-18+bob,3,9);

  // Occhi
  cx.fillStyle='#1a0a0a';
  cx.fillRect(sx-4,sy-14+bob,2,2);cx.fillRect(sx+2,sy-14+bob,2,2);
  // Luci occhi
  cx.fillStyle='rgba(255,255,255,.75)';
  cx.fillRect(sx-3,sy-15+bob,1,1);cx.fillRect(sx+3,sy-15+bob,1,1);
  // Bocca sorriso
  cx.fillStyle='rgba(0,0,0,.35)';
  cx.fillRect(sx-2,sy-10+bob,5,1);

  // Nome label
  if(label){
    const lbl=label.substring(0,14);
    cx.font='bold 9px monospace';cx.textAlign='center';
    const tw=cx.measureText(lbl).width;
    cx.fillStyle='rgba(0,0,0,.7)';cx.fillRect(sx-tw/2-4,sy-34+bob,tw+8,12);
    cx.fillStyle=isLocal?'#7bc74d':'#ffffff';
    cx.fillText(lbl,sx,sy-24+bob);
  }
}

// ── DISEGNO NPC INDICATORE ────────────────────────────────────
function drawNPC(npc){
  drawChar(npc.x,npc.y,npc.color,npc.walkF,npc.name,false,npc.hair);
  // Pallino sopra
  const [sx,sy]=t2s(npc.x,npc.y);
  cx.fillStyle=npc.color;
  cx.beginPath();cx.arc(sx,sy-24,4,0,Math.PI*2);cx.fill();
  cx.fillStyle='rgba(255,255,255,.45)';
  cx.beginPath();cx.arc(sx-1.2,sy-25.2,1.5,0,Math.PI*2);cx.fill();
}

// ── DISEGNO PARTICELLE ────────────────────────────────────────
function drawParticles(){
  for(const p of particles){
    const [sx,sy]=t2s(p.x,p.y);
    cx.globalAlpha=Math.max(0,p.life/p.maxLife);
    cx.fillStyle=p.color;
    cx.beginPath();cx.arc(sx,sy,p.size*(p.life/p.maxLife),0,Math.PI*2);cx.fill();
  }
  cx.globalAlpha=1;
}

// ── MINIMAP ───────────────────────────────────────────────────
function drawMinimap(){
  const map=zone===0?VMAP:SMAP;
  const mw=zone===0?MW:SMW, mh=zone===0?MH:SMH;
  const W=120,H=96;
  const px=W/mw, py=H/mh;
  mmCx.fillStyle='rgba(5,12,5,.9)';mmCx.fillRect(0,0,W,H);
  for(let y=0;y<mh;y++) for(let x=0;x<mw;x++){
    const t=map[y*mw+x];
    mmCx.fillStyle=
      t===T.PATH||t===T.STONE?'#9a8878':
      t===T.WATER||t===T.MWATER?'#3878cc':
      t===T.TREE||t===T.MTREE?'#1e5012':
      t===T.MGRASS?'#381890':
      t===T.MSTONE?'#402860':
      t===T.MRETURN?'#7050ff':
      t===T.SECRET?'#284022':'#3e8820';
    mmCx.fillRect(x*px,y*py,Math.ceil(px)+0.5,Math.ceil(py)+0.5);
  }
  // Edifici
  if(zone===0)for(const b of BUILDINGS){
    mmCx.fillStyle=b.wall;
    mmCx.fillRect(b.tx*px,b.ty*py,b.tw*px,b.th*py);
  }
  // Altri giocatori
  others.forEach(p=>{mmCx.fillStyle=p.color;mmCx.beginPath();mmCx.arc(p.x*px,p.y*py,2,0,Math.PI*2);mmCx.fill();});
  // Giocatore locale
  mmCx.fillStyle=myColor;mmCx.beginPath();mmCx.arc(player.x*px,player.y*py,2.5,0,Math.PI*2);mmCx.fill();
  mmCx.strokeStyle='rgba(123,199,77,.35)';mmCx.lineWidth=1;mmCx.strokeRect(0,0,W,H);
}

// ── RENDER PRINCIPALE ─────────────────────────────────────────
function render(){
  const W=cv.width,H=cv.height;
  const map=zone===0?VMAP:SMAP;
  const mw=zone===0?MW:SMW, mh=zone===0?MH:SMH;

  // Sfondo
  cx.fillStyle=zone===0?'#1a3010':'#100820';cx.fillRect(0,0,W,H);

  // Range visibile
  const x0=Math.max(0,Math.floor(cam.x-W/(2*TS))-2);
  const y0=Math.max(0,Math.floor(cam.y-H/(2*TS))-2);
  const x1=Math.min(mw,Math.ceil(cam.x+W/(2*TS))+3);
  const y1=Math.min(mh,Math.ceil(cam.y+H/(2*TS))+3);

  // 1) Terreno (no alberi)
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){
    const t=map[y*mw+x];
    if(t!==T.TREE&&t!==T.MTREE) drawTile(t,x,y);
  }

  // 2) Edifici
  if(zone===0)for(const b of BUILDINGS)drawBuilding(b);

  // 3) Fontana
  drawFountain(zone===0?CX-1:SCX_S-1,zone===0?CY-1:SCY_S-1);

  // 4) Depth sort: alberi + NPC + giocatori ordinati per Y
  const ents=[];
  for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){
    const t=map[y*mw+x];
    if(t===T.TREE||t===T.MTREE) ents.push({k:'tree',wx:x,wy:y,magic:t===T.MTREE,sy:y+1});
  }
  const nlist=zone===0?NPCS:[SECRET_NPC];
  for(const n of nlist) ents.push({k:'npc',n,sy:n.y});
  others.forEach(p=>ents.push({k:'other',p,sy:p.y}));
  ents.push({k:'player',sy:player.y});
  ents.sort((a,b)=>a.sy-b.sy);

  for(const e of ents){
    if(e.k==='tree') drawTree(e.wx,e.wy,e.magic);
    else if(e.k==='npc') drawNPC(e.n);
    else if(e.k==='other') drawChar(e.p.x,e.p.y,e.p.color,e.p.walkF||0,e.p.name,false);
    else drawChar(player.x,player.y,myColor,player.walkF,myName,true);
  }

  // 5) Particelle
  drawParticles();

  // 6) Vignette
  const vg=cx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.75);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,zone===0?'rgba(0,5,0,.6)':'rgba(5,0,15,.7)');
  cx.fillStyle=vg;cx.fillRect(0,0,W,H);

  // 7) Overlay viola area segreta
  if(zone===1){cx.fillStyle=`rgba(50,0,80,${.06+Math.sin(gameTime*.7)*.03})`;cx.fillRect(0,0,W,H);}

  // 8) Fade transizione
  if(fadeAlpha>0.01){cx.fillStyle=`rgba(0,0,0,${fadeAlpha})`;cx.fillRect(0,0,W,H);}
}

// ── BUILDING PANEL ────────────────────────────────────────────
const FALLBACK={
  storia:[{id:1,title:'Antica Roma',description:'Quiz sull\'Impero Romano',author:'Prof. Martini',type:'quiz',plays:0}],
  matematica:[{id:4,title:'Equazioni I Grado',description:'Esercizi di algebra',author:'Prof. Russo',type:'quiz',plays:0}],
  scienze:[{id:5,title:'Elementi Chimici',description:'Collega simbolo ed elemento',author:'Prof. Bianchi',type:'matching',plays:0}],
  letteratura:[{id:3,title:'Vocaboli Inglese',description:'Flashcard inglese-italiano',author:'Giulia R.',type:'flashcard',plays:0}],
  geografia:[{id:2,title:'Capitali Europa',description:'Collega paese e capitale',author:'Prof. Rossi',type:'matching',plays:0}],
  informatica:[{id:6,title:'Comandi Linux',description:'Flashcard dei comandi',author:'Prof. Verdi',type:'flashcard',plays:0}],
};
const typeColor={quiz:'#5588dd',flashcard:'#ddaa30',matching:'#30aa60',snake:'#30cccc',tetris:'#9966cc'};
const typeIcon={quiz:'❓',flashcard:'🃏',matching:'🔗',snake:'🐍',tetris:'🧱'};

async function openPanel(b){
  panelOpen=true;currentSubject=b.id;
  const panel=document.getElementById('panel');
  panel.style.display='flex';
  document.getElementById('panelIcon').textContent=b.icon;
  document.getElementById('panelIcon').style.cssText=`background:${b.wall}22;border:2px solid ${b.wall}66;border-radius:6px;width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0`;
  document.getElementById('panelName').textContent=b.name;
  document.getElementById('panelName').style.color=b.wall;
  document.getElementById('panelDesc').textContent=b.desc;
  const grid=document.getElementById('gamesGrid');
  grid.innerHTML='<p style="color:rgba(255,255,255,.25);font-family:\'Press Start 2P\',monospace;font-size:.45rem;padding:20px;grid-column:1/-1;letter-spacing:2px">CARICAMENTO...</p>';
  let games=[];
  games = await GS.getGames(b.subject);
  if(!games.length)games=FALLBACK[b.id]||[];
  if(!games.length){grid.innerHTML='<p style="color:rgba(255,255,255,.2);padding:20px;font-family:VT323,monospace;font-size:1.1rem;grid-column:1/-1">Nessun gioco ancora — creane uno! 👆</p>';return;}
  grid.innerHTML='';
  games.forEach(g=>{
    const c=typeColor[g.type]||b.wall;
    const card=document.createElement('div');card.className='gameCard';
    card.innerHTML=`<div class="gtype" style="color:${c}">${typeIcon[g.type]||'🎮'} ${(g.type||'').toUpperCase()}</div>
      <h3>${g.title}</h3><p>${g.description||''}</p>
      <div class="cardFoot"><span class="cardAuth">👤 ${g.author||'Anonimo'} · ▶ ${g.plays||0}</span>
      <button class="playBtn" onclick="event.stopPropagation();window.location.href='play.html?id=${g.id}'">▶ GIOCA</button></div>`;
    grid.appendChild(card);
  });
}
function closePanel(){document.getElementById('panel').style.display='none';panelOpen=false;}
document.getElementById('panelClose').addEventListener('click',closePanel);
document.getElementById('newGameBtn').addEventListener('click',()=>{
  window.location.href = 'create.html'+(currentSubject?'?subject='+currentSubject:'');
});
document.addEventListener('keydown',e=>{if(e.code==='Escape'&&panelOpen)closePanel();});

// ── AVVIO ─────────────────────────────────────────────────────
function start(){
  const v=document.getElementById('nameIn').value.trim();
  if(!v){document.getElementById('nameIn').style.borderColor='#ff4444';return;}
  myName=v.substring(0,16);
  localStorage.setItem('gameup_player_name', myName);
  document.getElementById('nameScreen').style.display='none';
  document.getElementById('hudName').textContent=myName;
  initWS();
  requestAnimationFrame(loop);
}
document.getElementById('enterBtn').addEventListener('click',start);
document.getElementById('nameIn').addEventListener('keydown',e=>{if(e.key==='Enter')start();});

// Ricarica lista giochi se create.html ha salvato qualcosa
window.addEventListener('storage', e=>{
  if(e.key===LS_KEY && panelOpen && currentSubject){
    openPanel(BUILDINGS.find(b=>b.id===currentSubject)||BUILDINGS[0]);
  }
});

// Auto-login se il nome è già salvato
(function autoLogin(){
  const saved=localStorage.getItem('gameup_player_name');
  if(saved){
    document.getElementById('nameIn').value=saved;
    // piccolo delay per far caricare il DOM
    setTimeout(start, 50);
  }
})();

// ── LOOP ──────────────────────────────────────────────────────
let lastT=0;
let mmTimer=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;gameTime=ts/1000;
  updatePlayer(dt);
  updateNPCs(dt);
  updateParticles(dt);
  updateCam();
  updateFade(dt);
  render();
  mmTimer+=dt;
  if(mmTimer>.12){drawMinimap();mmTimer=0;}
}
</script>
