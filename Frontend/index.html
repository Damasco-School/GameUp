<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameUp — Il Mondo della Conoscenza</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Exo 2', sans-serif;
    color: #fff;
    cursor: crosshair;
  }

  #canvas { display: block; width: 100vw; height: 100vh; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  #top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
  }

  #logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem; font-weight: 900;
    background: linear-gradient(135deg, #00f5d4, #7b2ff7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
    text-shadow: none;
    filter: drop-shadow(0 0 12px rgba(0,245,212,0.5));
  }

  #compass {
    width: 56px; height: 56px;
    border: 2px solid rgba(0,245,212,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-family: 'Orbitron', sans-serif;
    color: #00f5d4; letter-spacing: 1px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
  }

  #crosshair {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    opacity: 0.7;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute;
    background: #00f5d4;
    box-shadow: 0 0 6px #00f5d4;
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
  #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }

  #controls-hint {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 16px; align-items: center;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    border: 1px solid rgba(0,245,212,0.2);
    border-radius: 40px; padding: 10px 24px;
    font-size: 0.75rem; color: rgba(255,255,255,0.7);
    letter-spacing: 1px;
    transition: opacity 0.5s;
  }
  #controls-hint .key {
    display: inline-block;
    background: rgba(0,245,212,0.15);
    border: 1px solid rgba(0,245,212,0.4);
    border-radius: 6px; padding: 2px 8px;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; color: #00f5d4;
  }

  /* Building tooltip */
  #tooltip {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, calc(-50% - 80px));
    background: rgba(0,0,0,0.75); backdrop-filter: blur(16px);
    border: 1px solid rgba(0,245,212,0.5);
    border-radius: 16px; padding: 16px 28px;
    text-align: center; min-width: 200px;
    display: none;
    animation: floatIn 0.3s ease;
    pointer-events: none;
  }
  #tooltip h3 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1rem; font-weight: 700;
    color: #00f5d4; margin-bottom: 4px;
    letter-spacing: 2px;
  }
  #tooltip p { font-size: 0.78rem; color: rgba(255,255,255,0.6); }
  #tooltip .enter-hint {
    margin-top: 10px; font-size: 0.7rem;
    color: #7b2ff7; font-family: 'Orbitron', sans-serif;
    animation: pulse 1.5s infinite;
  }
  @keyframes floatIn {
    from { opacity: 0; transform: translate(-50%, calc(-50% - 70px)); }
    to   { opacity: 1; transform: translate(-50%, calc(-50% - 80px)); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* Building Panel / Modal */
  #building-panel {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
    z-index: 100; display: none;
    flex-direction: column; align-items: center; justify-content: flex-start;
    padding: 40px 24px; overflow-y: auto;
    animation: panelIn 0.4s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes panelIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  #panel-header {
    width: 100%; max-width: 900px;
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 36px;
  }
  #panel-icon {
    font-size: 3rem; width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 20px; flex-shrink: 0;
  }
  #panel-title h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.8rem; font-weight: 900; letter-spacing: 3px;
  }
  #panel-title p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 4px; }

  #panel-close {
    margin-left: auto; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff; border-radius: 50%; width: 44px; height: 44px;
    font-size: 1.2rem; cursor: pointer; pointer-events: all;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  #panel-close:hover { background: rgba(255,0,80,0.2); border-color: #ff0050; }

  #games-grid {
    width: 100%; max-width: 900px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .game-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 24px;
    cursor: pointer; pointer-events: all;
    transition: all 0.25s cubic-bezier(0.16,1,0.3,1);
    position: relative; overflow: hidden;
  }
  .game-card::before {
    content: ''; position: absolute;
    inset: 0; border-radius: 18px;
    opacity: 0; transition: opacity 0.3s;
  }
  .game-card:hover {
    transform: translateY(-6px);
    border-color: rgba(0,245,212,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,245,212,0.1);
  }
  .game-card:hover::before { opacity: 1; }
  .game-card .card-type {
    font-size: 0.65rem; font-family: 'Orbitron', sans-serif;
    letter-spacing: 2px; margin-bottom: 12px;
    text-transform: uppercase;
  }
  .game-card h3 {
    font-size: 1.05rem; font-weight: 600; margin-bottom: 8px;
    line-height: 1.3;
  }
  .game-card p {
    font-size: 0.78rem; color: rgba(255,255,255,0.45);
    line-height: 1.5;
  }
  .game-card .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 16px; padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .game-card .author { font-size: 0.7rem; color: rgba(255,255,255,0.35); }
  .game-card .play-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem; letter-spacing: 1px;
    padding: 6px 14px; border-radius: 20px;
    border: none; cursor: pointer;
    background: linear-gradient(135deg, #00f5d4, #7b2ff7);
    color: #000; font-weight: 700;
  }
  .game-card .play-btn:hover { filter: brightness(1.2); }

  #create-btn {
    pointer-events: all;
    width: 100%; max-width: 900px;
    margin-top: 20px;
    padding: 20px;
    background: rgba(123,47,247,0.1);
    border: 2px dashed rgba(123,47,247,0.4);
    border-radius: 18px; cursor: pointer;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem; letter-spacing: 2px;
    color: #7b2ff7; transition: all 0.25s;
    display: flex; align-items: center; justify-content: center; gap: 12px;
  }
  #create-btn:hover {
    background: rgba(123,47,247,0.2);
    border-color: #7b2ff7;
    transform: translateY(-2px);
  }

  /* Minimap */
  #minimap {
    position: absolute; bottom: 24px; right: 24px;
    width: 120px; height: 120px;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    border: 1px solid rgba(0,245,212,0.25);
    border-radius: 12px; overflow: hidden;
    opacity: 0.8;
  }
  #minimap canvas { width: 100%; height: 100%; }

  /* Loading screen */
  #loading {
    position: fixed; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.8s;
  }
  #loading-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 3.5rem; font-weight: 900;
    background: linear-gradient(135deg, #00f5d4, #7b2ff7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 8px; margin-bottom: 8px;
    animation: logoGlow 2s ease-in-out infinite;
  }
  @keyframes logoGlow {
    0%,100% { filter: drop-shadow(0 0 10px rgba(0,245,212,0.4)); }
    50% { filter: drop-shadow(0 0 25px rgba(123,47,247,0.6)); }
  }
  #loading-sub {
    color: rgba(255,255,255,0.4); font-size: 0.8rem;
    letter-spacing: 4px; margin-bottom: 48px;
  }
  #loading-bar-wrap {
    width: 240px; height: 3px;
    background: rgba(255,255,255,0.1); border-radius: 3px;
    overflow: hidden;
  }
  #loading-bar {
    height: 100%; width: 0;
    background: linear-gradient(90deg, #00f5d4, #7b2ff7);
    border-radius: 3px;
    animation: loadFill 1.8s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: 0.3s;
  }
  @keyframes loadFill { from { width: 0; } to { width: 100%; } }
  #loading-text {
    margin-top: 16px; font-size: 0.7rem;
    font-family: 'Orbitron', sans-serif;
    color: rgba(0,245,212,0.6); letter-spacing: 2px;
    animation: loadText 1.8s steps(1) forwards;
    animation-delay: 0.3s;
  }

  /* Pointer lock overlay */
  #pointer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    z-index: 50; cursor: pointer;
    flex-direction: column; gap: 16px;
  }
  #pointer-overlay h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem; letter-spacing: 4px; color: #00f5d4;
  }
  #pointer-overlay p { color: rgba(255,255,255,0.5); font-size: 0.85rem; letter-spacing: 2px; }
  #pointer-overlay .click-icon { font-size: 3rem; animation: bounce 1.5s infinite; }
  @keyframes bounce {
    0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); }
  }
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div id="loading-logo">GAMEUP</div>
  <div id="loading-sub">IL MONDO DELLA CONOSCENZA</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  <div id="loading-text">INIZIALIZZANDO IL MONDO...</div>
</div>

<!-- Pointer Lock Overlay -->
<div id="pointer-overlay" style="display:none;">
  <div class="click-icon">🖱️</div>
  <h2>ENTRA NEL MONDO</h2>
  <p>CLICCA PER ESPLORARE</p>
</div>

<!-- Main Canvas -->
<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="top-bar">
    <div id="logo">GAMEUP</div>
    <div id="compass">N</div>
  </div>
  <div id="crosshair"></div>
  <div id="tooltip">
    <h3 id="tt-name">—</h3>
    <p id="tt-desc">—</p>
    <div class="enter-hint">[ E ] per entrare</div>
  </div>
  <div id="controls-hint">
    <span><span class="key">WASD</span> muovi</span>
    <span><span class="key">MOUSE</span> guarda</span>
    <span><span class="key">E</span> entra</span>
    <span><span class="key">ESC</span> esci</span>
  </div>
  <div id="minimap"><canvas id="minimap-canvas" width="120" height="120"></canvas></div>
</div>

<!-- Building Panel -->
<div id="building-panel">
  <div id="panel-header">
    <div id="panel-icon"></div>
    <div id="panel-title">
      <h2 id="panel-name">—</h2>
      <p id="panel-desc">—</p>
    </div>
    <button id="panel-close">✕</button>
  </div>
  <div id="games-grid"></div>
  <button id="create-btn">＋ &nbsp; CREA UN NUOVO GIOCO</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
//  GAMEUP — 3D World
// ============================================================

const API = 'http://localhost:8080';

// -------- Buildings data --------
const BUILDINGS = [
  {
    id: 'storia',
    name: 'STORIA',
    desc: 'Esplora le civiltà del passato',
    icon: '🏛️',
    color: 0xe8c84a,
    accentColor: '#e8c84a',
    pos: { x: -14, z: -14 },
    angle: Math.PI / 4,
    games: []
  },
  {
    id: 'matematica',
    name: 'MATEMATICA',
    desc: 'Sfida il tuo cervello con i numeri',
    icon: '📐',
    color: 0x4a9fe8,
    accentColor: '#4a9fe8',
    pos: { x: 14, z: -14 },
    angle: -Math.PI / 4,
    games: []
  },
  {
    id: 'scienze',
    name: 'SCIENZE',
    desc: 'Scopri i segreti della natura',
    icon: '🔬',
    color: 0x4ae8a0,
    accentColor: '#4ae8a0',
    pos: { x: 14, z: 14 },
    angle: -3 * Math.PI / 4,
    games: []
  },
  {
    id: 'letteratura',
    name: 'LETTERATURA',
    desc: 'Viaggia tra le parole',
    icon: '📚',
    color: 0xe84a7a,
    accentColor: '#e84a7a',
    pos: { x: -14, z: 14 },
    angle: 3 * Math.PI / 4,
    games: []
  },
  {
    id: 'geografia',
    name: 'GEOGRAFIA',
    desc: 'Esplora il mondo',
    icon: '🌍',
    color: 0xa04ae8,
    accentColor: '#a04ae8',
    pos: { x: 0, z: -20 },
    angle: 0,
    games: []
  },
  {
    id: 'informatica',
    name: 'INFORMATICA',
    desc: 'Programma il futuro',
    icon: '💻',
    color: 0x00f5d4,
    accentColor: '#00f5d4',
    pos: { x: 0, z: 20 },
    angle: Math.PI,
    games: []
  },
];

// -------- Sample games (fallback if no API) --------
const SAMPLE_GAMES = {
  storia: [
    { id: 1, title: 'Antica Roma — Quiz', description: 'Quanto conosci l\'Impero Romano?', author: 'Prof. Martini', type: 'QUIZ' },
    { id: 2, title: 'Prima Guerra Mondiale', description: 'Date, battaglie, protagonisti', author: 'Giulia R.', type: 'FLASHCARD' },
    { id: 3, title: 'Rinascimento Italiano', description: 'Arte e cultura del XV secolo', author: 'Marco T.', type: 'QUIZ' },
  ],
  matematica: [
    { id: 4, title: 'Algebra Base', description: 'Equazioni di primo grado', author: 'Prof. Russo', type: 'QUIZ' },
    { id: 5, title: 'Geometria Piana', description: 'Aree e perimetri', author: 'Sofia L.', type: 'ESERCIZI' },
  ],
  scienze: [
    { id: 6, title: 'Il Sistema Solare', description: 'Pianeti e stelle', author: 'Andrea M.', type: 'QUIZ' },
    { id: 7, title: 'Chimica Organica', description: 'Molecole e reazioni', author: 'Prof. Bianchi', type: 'FLASHCARD' },
  ],
  letteratura: [
    { id: 8, title: 'Dante Alighieri', description: 'La Divina Commedia', author: 'Prof. Conti', type: 'QUIZ' },
    { id: 9, title: 'Leopardi e il Romanticismo', description: 'Poesia e temi romantici', author: 'Elena V.', type: 'QUIZ' },
  ],
  geografia: [
    { id: 10, title: 'Capitali d\'Europa', description: 'Conosci le capitali europee?', author: 'Luca P.', type: 'QUIZ' },
  ],
  informatica: [
    { id: 11, title: 'Reti e Protocolli', description: 'TCP/IP, DNS, HTTP spiegati', author: 'Prof. Ferrari', type: 'QUIZ' },
    { id: 12, title: 'HTML & CSS Base', description: 'I fondamentali del web', author: 'Chiara N.', type: 'ESERCIZI' },
  ],
};

// ============================================================
//  THREE.JS SETUP
// ============================================================

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
renderer.setClearColor(0x0a0a1a);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.025);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 5);

// -------- Lighting --------
const ambient = new THREE.AmbientLight(0x223355, 1.2);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5d0, 1.5);
sun.position.set(20, 40, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 120;
sun.shadow.camera.left = sun.shadow.camera.bottom = -50;
sun.shadow.camera.right = sun.shadow.camera.top = 50;
scene.add(sun);

// Colored point lights
[{ color: 0x00f5d4, x: -8, z: -8 }, { color: 0x7b2ff7, x: 8, z: -8 },
 { color: 0xff6b9d, x: 8, z: 8 }, { color: 0x4ae8a0, x: -8, z: 8 }]
.forEach(l => {
  const pl = new THREE.PointLight(l.color, 0.8, 25);
  pl.position.set(l.x, 4, l.z);
  scene.add(pl);
});

// -------- Floor --------
const floorGeo = new THREE.PlaneGeometry(200, 200, 40, 40);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  roughness: 0.85,
  metalness: 0.1,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines on floor
const gridHelper = new THREE.GridHelper(200, 80, 0x223355, 0x1a1a33);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// -------- Piazza / Center path --------
function makePlaza() {
  // Central circle
  const circleGeo = new THREE.CylinderGeometry(9, 9, 0.08, 64);
  const circleMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6 });
  const circle = new THREE.Mesh(circleGeo, circleMat);
  circle.receiveShadow = true;
  scene.add(circle);

  // Paths to buildings
  BUILDINGS.forEach(b => {
    const len = Math.sqrt(b.pos.x**2 + b.pos.z**2) - 8;
    const pathGeo = new THREE.BoxGeometry(2.5, 0.06, len);
    const pathMat = new THREE.MeshStandardMaterial({ color: 0x151525, roughness: 0.7 });
    const path = new THREE.Mesh(pathGeo, pathMat);
    const angle = Math.atan2(b.pos.x, b.pos.z);
    const dist = Math.sqrt(b.pos.x**2 + b.pos.z**2);
    path.position.set(
      b.pos.x / dist * (dist / 2),
      0.03,
      b.pos.z / dist * (dist / 2)
    );
    path.rotation.y = angle;
    path.receiveShadow = true;
    scene.add(path);
  });
}
makePlaza();

// -------- Fountain --------
function makeFountain() {
  const group = new THREE.Group();

  // Base pool
  const poolGeo = new THREE.CylinderGeometry(3.2, 3.4, 0.4, 32);
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.9 });
  const pool = new THREE.Mesh(poolGeo, stoneMat);
  pool.castShadow = true; pool.receiveShadow = true;
  group.add(pool);

  // Water
  const waterGeo = new THREE.CylinderGeometry(3.0, 3.0, 0.15, 32);
  const waterMat = new THREE.MeshStandardMaterial({
    color: 0x0066aa, transparent: true, opacity: 0.75,
    roughness: 0.1, metalness: 0.3,
  });
  const water = new THREE.Mesh(waterGeo, waterMat);
  water.position.y = 0.28;
  group.add(water);

  // Center column
  const colGeo = new THREE.CylinderGeometry(0.25, 0.35, 2.2, 16);
  const col = new THREE.Mesh(colGeo, stoneMat);
  col.position.y = 1.1; col.castShadow = true;
  group.add(col);

  // Top bowl
  const bowlGeo = new THREE.CylinderGeometry(1.2, 0.3, 0.5, 24);
  const bowl = new THREE.Mesh(bowlGeo, stoneMat);
  bowl.position.y = 2.45; bowl.castShadow = true;
  group.add(bowl);

  // Fountain glow
  const fountainLight = new THREE.PointLight(0x00aaff, 1.5, 10);
  fountainLight.position.y = 1;
  group.add(fountainLight);

  // Water particles (spheres)
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const spGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const spMat = new THREE.MeshStandardMaterial({ color: 0x88ddff, transparent: true, opacity: 0.8 });
    const sp = new THREE.Mesh(spGeo, spMat);
    sp.position.set(Math.cos(angle) * 0.9, 2.6, Math.sin(angle) * 0.9);
    sp.userData.fountainDrop = { angle, speed: 0.5 + Math.random() * 0.5, t: Math.random() };
    group.add(sp);
  }

  group.position.y = 0.04;
  scene.add(group);
  return group;
}
const fountain = makeFountain();

// -------- Buildings --------
const buildingMeshes = [];
function makeBuilding(b) {
  const group = new THREE.Group();
  group.userData.building = b;

  const mat = new THREE.MeshStandardMaterial({
    color: b.color,
    roughness: 0.55,
    metalness: 0.25,
  });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x111120, roughness: 0.8 });
  const glassMat = new THREE.MeshStandardMaterial({
    color: b.color, transparent: true, opacity: 0.35,
    roughness: 0.05, metalness: 0.9,
  });

  // Main body
  const bodyGeo = new THREE.BoxGeometry(7, 6, 7);
  const body = new THREE.Mesh(bodyGeo, darkMat);
  body.position.y = 3;
  body.castShadow = true; body.receiveShadow = true;
  group.add(body);

  // Facade strips
  [-3, -1, 1, 3].forEach(xOff => {
    const stripGeo = new THREE.BoxGeometry(0.4, 6, 0.05);
    const strip = new THREE.Mesh(stripGeo, mat);
    strip.position.set(xOff, 3, 3.53);
    group.add(strip);
  });

  // Glass windows (front)
  for (let row = 0; row < 3; row++) {
    for (let col = 0; col < 3; col++) {
      const winGeo = new THREE.BoxGeometry(1.4, 1.2, 0.05);
      const win = new THREE.Mesh(winGeo, glassMat);
      win.position.set(-2.1 + col * 2.1, 1.2 + row * 1.8, 3.54);
      group.add(win);
    }
  }

  // Roof
  const roofGeo = new THREE.BoxGeometry(7.6, 0.4, 7.6);
  const roof = new THREE.Mesh(roofGeo, mat);
  roof.position.y = 6.2;
  roof.castShadow = true;
  group.add(roof);

  // Roof decoration — pyramid
  const pyGeo = new THREE.ConeGeometry(3, 2.5, 4);
  const py = new THREE.Mesh(pyGeo, mat);
  py.position.y = 7.8; py.rotation.y = Math.PI / 4;
  py.castShadow = true;
  group.add(py);

  // Door arch
  const doorGeo = new THREE.BoxGeometry(2, 2.8, 0.1);
  const door = new THREE.Mesh(doorGeo, glassMat);
  door.position.set(0, 1.4, 3.56);
  group.add(door);

  // Sign / label
  const signGeo = new THREE.BoxGeometry(5, 0.8, 0.1);
  const sign = new THREE.Mesh(signGeo, mat);
  sign.position.set(0, 7.2, 3.56);
  group.add(sign);

  // Point light on building
  const bLight = new THREE.PointLight(b.color, 0.6, 15);
  bLight.position.set(0, 8, 3);
  group.add(bLight);

  // Glow orb at top
  const orbGeo = new THREE.SphereGeometry(0.3, 16, 16);
  const orbMat = new THREE.MeshStandardMaterial({
    color: b.color, emissive: b.color, emissiveIntensity: 2,
    transparent: true, opacity: 0.9,
  });
  const orb = new THREE.Mesh(orbGeo, orbMat);
  orb.position.y = 9.8;
  group.add(orb);

  // Collision / interaction box (invisible)
  const hitGeo = new THREE.BoxGeometry(7, 8, 7);
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hit = new THREE.Mesh(hitGeo, hitMat);
  hit.position.y = 4;
  hit.userData.isBuilding = true;
  hit.userData.building = b;
  group.add(hit);

  group.position.set(b.pos.x, 0, b.pos.z);
  scene.add(group);
  buildingMeshes.push({ group, hit, building: b, orb });
  return group;
}
BUILDINGS.forEach(makeBuilding);

  const poleGeo = new THREE.CylinderGeometry(0.07, 0.1, 4, 8);

  const pole = new THREE.Mesh(poleGeo, poleMat);

  const headGeo = new THREE.SphereGeometry(0.2, 12, 12);

  const head = new THREE.Mesh(headGeo, headMat);

  const pl = new THREE.PointLight(0xfff5aa, 0.5, 10);
  pl.position.y = 4.2;

  group.position.set(x, 0, z);

}

// ============================================================
//  FIRST-PERSON CONTROLS
// ============================================================

const keys = {};
let yaw = 0, pitch = 0;
let isLocked = false;
let nearBuilding = null;
const SPEED = 0.07;
const COLLISION_RADIUS = 4;

const pointerOverlay = document.getElementById('pointer-overlay');
const tooltip = document.getElementById('tooltip');

// Pointer Lock
canvas.addEventListener('click', () => {
  if (!isLocked) canvas.requestPointerLock();
});
pointerOverlay.addEventListener('click', () => canvas.requestPointerLock());

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === canvas;
  pointerOverlay.style.display = isLocked ? 'none' : 'flex';
  document.getElementById('building-panel').style.display === 'flex' && (pointerOverlay.style.display = 'none');
});

document.addEventListener('mousemove', e => {
  if (!isLocked) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-0.9, Math.min(0.9, pitch));
});

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// Enter building
document.addEventListener('keydown', e => {
  if (e.code === 'KeyE' && nearBuilding && isLocked) {
    document.exitPointerLock();
    openBuilding(nearBuilding);
  }
  if (e.code === 'Escape') closePanel();
});

function moveCamera() {
  if (!isLocked) return;

  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  dir.y = 0; dir.normalize();
  const right = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0,1,0));

  const vel = new THREE.Vector3();
  if (keys['KeyW'] || keys['ArrowUp'])    vel.add(dir);
  if (keys['KeyS'] || keys['ArrowDown'])  vel.sub(dir);
  if (keys['KeyA'] || keys['ArrowLeft'])  vel.sub(right);
  if (keys['KeyD'] || keys['ArrowRight']) vel.add(right);

  if (vel.lengthSq() > 0) vel.normalize().multiplyScalar(SPEED);

  const next = camera.position.clone().add(vel);

  // Collision with buildings
  let blocked = false;
  BUILDINGS.forEach(b => {
    const dx = next.x - b.pos.x;
    const dz = next.z - b.pos.z;
    if (Math.sqrt(dx*dx + dz*dz) < COLLISION_RADIUS) blocked = true;
  });
  // World boundary
  if (Math.abs(next.x) > 45 || Math.abs(next.z) > 45) blocked = true;

  if (!blocked) camera.position.add(vel);
  camera.position.y = 1.7;

  // Camera rotation
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;
}

function checkProximity() {
  let closest = null;
  let closestDist = 9;

  BUILDINGS.forEach(b => {
    const dx = camera.position.x - b.pos.x;
    const dz = camera.position.z - b.pos.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist < closestDist) { closestDist = dist; closest = b; }
  });

  nearBuilding = closest;
  if (closest) {
    tooltip.style.display = 'block';
    document.getElementById('tt-name').textContent = closest.icon + '  ' + closest.name;
    document.getElementById('tt-desc').textContent = closest.desc;
  } else {
    tooltip.style.display = 'none';
  }
}

// ============================================================
//  MINIMAP
// ============================================================
const minimapCanvas = document.getElementById('minimap-canvas');
const mctx = minimapCanvas.getContext('2d');
const MAP_SIZE = 120, MAP_SCALE = 120 / 90;

function drawMinimap() {
  mctx.fillStyle = '#0a0a1a';
  mctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

  const cx = MAP_SIZE / 2, cy = MAP_SIZE / 2;

  // Buildings
  BUILDINGS.forEach(b => {
    const mx = cx + b.pos.x * MAP_SCALE;
    const my = cy + b.pos.z * MAP_SCALE;
    mctx.fillStyle = '#' + b.color.toString(16).padStart(6, '0');
    mctx.fillRect(mx - 4, my - 4, 8, 8);
  });

  // Fountain
  mctx.fillStyle = '#00aaff';
  mctx.beginPath();
  mctx.arc(cx, cy, 4, 0, Math.PI * 2);
  mctx.fill();

  // Player
  const px = cx + camera.position.x * MAP_SCALE;
  const py = cy + camera.position.z * MAP_SCALE;
  mctx.fillStyle = '#00f5d4';
  mctx.beginPath();
  mctx.arc(px, py, 3, 0, Math.PI * 2);
  mctx.fill();

  // Player direction
  const dAngle = -yaw;
  mctx.strokeStyle = '#00f5d4';
  mctx.lineWidth = 1.5;
  mctx.beginPath();
  mctx.moveTo(px, py);
  mctx.lineTo(px + Math.sin(dAngle) * 8, py + Math.cos(dAngle) * 8);
  mctx.stroke();
}

// ============================================================
//  BUILDING PANEL
// ============================================================

async function fetchGames(subjectId) {
  try {
    const res = await fetch(`${API}/games?subject=${subjectId}`);
    if (!res.ok) throw new Error();
    return await res.json();
  } catch {
    return SAMPLE_GAMES[subjectId] || [];
  }
}

const panel = document.getElementById('building-panel');

async function openBuilding(b) {
  panel.style.display = 'flex';
  currentSubject = b.id;
  document.getElementById('panel-icon').textContent = b.icon;
  document.getElementById('panel-icon').style.cssText = `
    background: ${b.accentColor}22;
    border: 2px solid ${b.accentColor}44;
    border-radius: 20px; width:72px; height:72px;
    display:flex; align-items:center; justify-content:center;
    font-size:2.2rem; flex-shrink:0;
  `;
  document.getElementById('panel-name').textContent = b.name;
  document.getElementById('panel-name').style.color = b.accentColor;
  document.getElementById('panel-desc').textContent = b.desc;

  const grid = document.getElementById('games-grid');
  grid.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:.85rem;letter-spacing:2px;padding:20px;">CARICAMENTO...</div>';

  const games = await fetchGames(b.id);
  b.games = games;

  if (games.length === 0) {
    grid.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:.85rem;letter-spacing:2px;padding:20px;grid-column:1/-1;">Nessun gioco ancora. Creane uno!</div>';
    return;
  }

  grid.innerHTML = '';
  games.forEach(g => {
    const typeColors = { quiz:'#4a9fe8', flashcard:'#e8c84a', matching:'#4ae8a0', snake:'#00f5d4', tetris:'#7b2ff7' };
    const tc = typeColors[g.type] || b.accentColor;
    const typeIcons = { quiz:'❓', flashcard:'🃏', matching:'🔗', snake:'🐍', tetris:'🧱' };
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="card-type" style="color:${tc};">${typeIcons[g.type] || '🎮'} ${g.type?.toUpperCase() || 'GIOCO'}</div>
      <h3>${g.title}</h3>
      <p>${g.description || ''}</p>
      <div class="card-footer">
        <span class="author">👤 ${g.author || 'Anonimo'} &nbsp;·&nbsp; ▶ ${g.plays || 0} partite</span>
        <button class="play-btn" onclick="playGame(${g.id})">▶ GIOCA</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function closePanel() {
  panel.style.display = 'none';
  setTimeout(() => {
    if (!isLocked) canvas.requestPointerLock();
  }, 100);
}

document.getElementById('panel-close').addEventListener('click', closePanel);

// Store current subject for create button
let currentSubject = null;

document.getElementById('create-btn').addEventListener('click', () => {
  const url = currentSubject
    ? `create.html?subject=${currentSubject}`
    : 'create.html';
  window.location.href = url;
});

window.playGame = function(id) {
  window.location.href = `play.html?id=${id}`;
};

// ============================================================
//  ANIMATION LOOP
// ============================================================

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;

  moveCamera();
  checkProximity();

  // Animate fountain drops
  fountain.children.forEach(child => {
    if (child.userData.fountainDrop) {
      const fd = child.userData.fountainDrop;
      fd.t += fd.speed * 0.016;
      if (fd.t > 1) fd.t = 0;
      const angle = fd.angle + t * 0.3;
      const r = 0.9 * Math.sin(fd.t * Math.PI);
      const y = 2.6 + Math.sin(fd.t * Math.PI) * 1.8 - fd.t * fd.t * 2.5;
      child.position.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
      child.material.opacity = 1 - fd.t * 0.8;
    }
  });

  // Pulsing orbs on buildings
  buildingMeshes.forEach(({ orb, building }, i) => {
    const pulse = Math.sin(t * 1.5 + i) * 0.5 + 1.5;
    orb.material.emissiveIntensity = pulse;
    orb.scale.setScalar(0.8 + Math.sin(t + i) * 0.2);
  });

  // Minimap
  if (t % 0.05 < 0.016) drawMinimap();

  renderer.render(scene, camera);
}
animate();

// -------- Resize --------
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// -------- Hide loading --------
window.addEventListener('load', () => {
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => {
      loading.style.display = 'none';
      pointerOverlay.style.display = 'flex';
    }, 800);
  }, 2200);
});
