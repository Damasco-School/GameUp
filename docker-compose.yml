version: '3.8'

# ================================================================
#  GameUp — Docker Compose  (4 container)
#
#  AVVIO:  docker-compose up --build
#
#  ACCESSO DAL PC DEL SERVER:
#    Frontend  → http://localhost
#    Backend   → http://localhost:8080
#    WebSocket → ws://localhost:3000
#
#  ACCESSO DA ALTRI PC (stesso WiFi/LAN):
#    Trova l'IP del PC server:
#      Windows  → ipconfig  (cerca "IPv4 Address")
#      Mac/Linux→ ip addr   (cerca inet su en0/eth0)
#    Poi apri: http://<QUELL-IP>   sul browser dell'amico
# ================================================================

services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: gameup
      MYSQL_USER: gameup_user
      MYSQL_PASSWORD: gameup_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gameup_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ugameup_user", "-pgameup_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: gameup_user
      DB_PASS: gameup_pass
      DB_NAME: gameup
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gameup_net

  ws-server:
    build: ./ws-server
    restart: always
    ports:
      - "3000:3000"
    networks:
      - gameup_net

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
      - ws-server
    networks:
      - gameup_net

volumes:
  db_data:

networks:
  gameup_net:
    driver: bridge
