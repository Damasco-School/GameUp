version: '3.8'

services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: gameup
      MYSQL_USER: gameup_user
      MYSQL_PASSWORD: gameup_pass
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gameup_net

  backend:
    build: ./backend
    restart: always
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_USER: gameup_user
      DB_PASS: gameup_pass
      DB_NAME: gameup
    depends_on:
      - db
    networks:
      - gameup_net

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    networks:
      - gameup_net

volumes:
  db_data:

networks:
  gameup_net:
    driver: bridge
